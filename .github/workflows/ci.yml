name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate NDJSON example/fixture lines (JSON Schema)
        run: |
          set -euo pipefail
          pip install --disable-pip-version-check -q 'check-jsonschema>=0.28'
          SCHEMA=protocol/schema/ndjson-stdin-line.schema.json
          for f in examples/sample-input.ndjson examples/sample-zones.ndjson crates/cli/tests/fixtures/*.ndjson; do
            echo "Checking $f"
            while IFS= read -r line || [ -n "${line:-}" ]; do
              [ -z "$line" ] && continue
              echo "$line" | python -m check_jsonschema --schemafile "$SCHEMA" -
            done < "$f"
          done

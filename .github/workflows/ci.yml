name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate NDJSON example/fixture lines (JSON Schema)
        run: |
          set -euo pipefail
          pip install --disable-pip-version-check -q 'check-jsonschema>=0.28'
          SCHEMA=protocol/schema/ndjson-stdin-line.schema.json
          for f in examples/sample-input.ndjson examples/sample-zones.ndjson crates/cli/tests/fixtures/*.ndjson; do
            echo "Checking $f"
            while IFS= read -r line || [ -n "${line:-}" ]; do
              [ -z "$line" ] && continue
              echo "$line" | python -m check_jsonschema --schemafile "$SCHEMA" -
            done < "$f"
          done

  tag-release:
    name: Tag release
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    outputs:
      tagged: ${{ steps.push_tag.outputs.tagged }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tag if version not yet released
        id: push_tag
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          TAG="v$VERSION"
          echo "Current version: $TAG"
          if git ls-remote --tags origin "$TAG" | grep -q .; then
            echo "Tag $TAG already exists — skipping."
            echo "tagged=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "Pushed tag $TAG."
            echo "tagged=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish
    needs: tag-release
    if: needs.tag-release.outputs.tagged == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/publish.yml
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

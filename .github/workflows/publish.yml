name: Publish to npm

# Triggered automatically when CI pushes a vX.Y.Z tag after a version bump.
# Can also be triggered manually via the Actions UI.
# To release: run `make bump-patch` (or bump-minor/bump-major) then `git push`.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Build one .node binary per platform ─────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14           # Apple Silicon, native
          - target: x86_64-apple-darwin
            runner: macos-14           # arm64 runner, cross-compiles to x86_64
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm   # GitHub's native arm64 runner
          - target: x86_64-pc-windows-msvc
            runner: windows-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS deps
        run: npm ci
        working-directory: crates/adapters/napi

      - name: Build native module
        run: npm run build -- --target ${{ matrix.target }}
        working-directory: crates/adapters/napi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: crates/adapters/napi/*.node
          if-no-files-found: error

  # ── 2. Collect all binaries, publish to npm, and create GitHub release ─────
  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install JS deps
        run: npm ci
        working-directory: crates/adapters/napi

      # Download all per-platform artifacts into crates/adapters/napi/artifacts/
      - uses: actions/download-artifact@v4
        with:
          path: crates/adapters/napi/artifacts

      # napi artifacts copies each *.node into the committed npm/<platform>/ stubs.
      # The npm/ platform directories and their package.json files are committed;
      # only the *.node binaries are gitignored and populated here at publish time.
      - name: Organise artifacts
        run: npx napi artifacts --build-output-dir artifacts 
        working-directory: crates/adapters/napi

      # napi pre-publish: updates version in each npm/<platform>/package.json,
      # injects optionalDependencies into the root package.json, and publishes
      # each platform package to npm.
      - name: Pre-publish (platform packages)
        run: npx napi pre-publish -t npm --no-gh-release 
        working-directory: crates/adapters/napi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Compile types.ts → types.js + types.d.ts
      - name: Compile TypeScript
        run: npx tsc
        working-directory: crates/adapters/napi

      # Publish the root package last (depends on platform packages being live)
      - name: Publish root package
        run: npm publish --access public
        working-directory: crates/adapters/napi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
